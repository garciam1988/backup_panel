server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB
  datasource:
    # ⚠️ Variables sensibles SIN default. Si Railway no las provee, el backend
    # falla al arrancar — es el comportamiento correcto: mejor que arrancar con
    # creds expuestas. Si ves un error tipo "Could not resolve placeholder
    # 'SPRING_DATASOURCE_PASSWORD'" al desplegar, configurá esa variable en el
    # panel de Railway > Variables y reiniciá.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  mail:
    host: ${SMTP_HOST:wo51.wiroos.host}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USER:info@yes-traveluy.com}
    password: ${SMTP_PASS:YesTravel26}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.starttls.enable: false
      mail.smtp.starttls.required: false
      mail.smtp.ssl.trust: wo51.wiroos.host

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

coincidir:
  # ─── Datos de negocio (no sensibles, pueden tener default sano) ─────────
  sales-email: ${COINCIDIR_SALES_EMAIL:sales@yes-traveluy.com}
  mail-from:  ${MAIL_FROM:YES Travel <info@yes-traveluy.com>}
  mail-bcc:   ${MAIL_BCC:info@yes-traveluy.com}
  admin-panel-url: ${ADMIN_PANEL_URL:http://localhost:3002}
  portal-url:      ${NEXT_PUBLIC_USER_PANEL_URL:http://localhost:3001}
  user-portal-url: ${NEXT_PUBLIC_USER_PANEL_URL:${coincidir.portal-url:http://localhost:3001}}

  # ─── API keys (SIN DEFAULT — son secretos) ──────────────────────────────
  # Si falta alguna, el backend arranca igual pero los endpoints que la
  # usan responden con error claro. No queremos hardcodear las keys nunca.
  # La key vieja "sk-ant-api03-F0Dbv..." fue REVOCADA el 2026-05-19 por
  # exposición en el bundle JS público del frontend (VITE_ANTHROPIC_API_KEY).
  anthropic-key:    ${ANTHROPIC_API_KEY:}
  aerodatabox-key:  ${AERODATABOX_KEY:}
  pexels-key:       ${PEXELS_API_KEY:}
  elevenlabs-key:   ${ELEVENLABS_API_KEY:}
  openai-key:       ${OPENAI_API_KEY:}

  # ─── Whitelist de orígenes permitidos para /api/coinbot/ai/** ──────────
  # CSV de hosts (sin protocolo ni path). Ejemplo:
  #   asistente.yes-traveluy.com,bot.coincidir.app,localhost:5173
  # Si está vacío, el filtro queda permisivo (no recomendado en producción).
  # Configurar en Railway como COINBOT_ALLOWED_ORIGINS.
  allowed-origins:  ${COINBOT_ALLOWED_ORIGINS:}

  # ─── Twilio para WhatsApp Business (módulo Marketing) ──────────────────
  # Si las 3 vars están seteadas, el NotificationDispatcherJob manda
  # WhatsApp real. Si alguna falta, los mensajes quedan en QUEUED con
  # un log explicando que falta credencial. Cuenta Twilio gratis: 15 USD
  # de crédito. Más info: https://www.twilio.com/docs/whatsapp
  twilio:
    account-sid:   ${TWILIO_ACCOUNT_SID:}
    auth-token:    ${TWILIO_AUTH_TOKEN:}
    whatsapp-from: ${TWILIO_WHATSAPP_FROM:}

  # ─── Web Push (VAPID) para módulo Marketing ────────────────────────────
  # Las claves VAPID identifican al servidor frente al Push Service de cada
  # navegador (Google, Mozilla, Apple). Se generan UNA sola vez con el
  # endpoint GET /api/admin/marketing/vapid/generate (solo accesible en
  # desarrollo). El "subject" debe ser un mailto: o URL del operador.
  # Si las 3 vars no están, el envío real queda en QUEUED.
  vapid:
    public-key:  ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject:     ${VAPID_SUBJECT:mailto:info@coincidir.app}

  # ─── Credenciales del super-admin DIOS (env-only, sin default) ──────────
  # Configurá estas en Railway > Variables. Username puede tener default
  # ('dios') porque no es sensible — la password obviamente no.
  dios:
    username:     ${COINCIDIR_DIOS_USERNAME:dios}
    password:     ${COINCIDIR_DIOS_PASSWORD:1234}
    display-name: ${COINCIDIR_DIOS_DISPLAY_NAME:Dios}

  backups:
    dir: dumps
    admin-code: ${COINCIDIR_BACKUPS_ADMIN_CODE:}

security:
  jwt:
    # JWT secret SIN DEFAULT en producción. En Railway, generá uno con:
    # openssl rand -base64 32
    # y guardalo como JWT_SECRET en Variables.
    secret: ${JWT_SECRET}
    ttl-seconds: ${JWT_TTL_SECONDS:43200}

logging:
  level:
    app.coincidir.api.service.MatchingService: WARN
